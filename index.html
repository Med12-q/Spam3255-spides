        .replace(/{{PHONE}}/g, phone)
        .replace(/{{RANDOM}}/g, randomId)
        .replace(/{{DATE}}/g, date)
        .replace(/{{FULLDATE}}/g, fullDate)
        .replace(/{{MSG_COUNT}}/g, msgCount)
        .replace(/{{AGE}}/g, accountAge);
    
    // Ajout d'une signature légale
    body += `\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
LEGAL DECLARATION:

I, the undersigned, declare under penalty of perjury that:
1. All information in this report is true and accurate to the best of my knowledge
2. I have direct evidence supporting all allegations
3. I consent to WhatsApp sharing this information with law enforcement if required
4. I understand this report may be used in legal proceedings

Digital Signature: VERIFIED_USER_${randomId}
IP Address: ${Math.floor(Math.random() * 255)}.${Math.floor(Math.random() * 255)}.${Math.floor(Math.random() * 255)}.${Math.floor(Math.random() * 255)}
Device: ${['iPhone 15 Pro', 'Samsung Galaxy S24', 'Google Pixel 9', 'Xiaomi 14'][Math.floor(Math.random() * 4)]}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
`;
    
    const mailtoLink = `mailto:${REPORT_EMAILS[0]}?cc=${REPORT_EMAILS.slice(1).join(',')}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    
    window.open(mailtoLink, '_blank');
    return true;
}

async function sendWebReports(targetPhone, type) {
    const phone = formatPhoneForReport(targetPhone);
    const template = REPORT_TEMPLATES[type];
    const randomId = generateRandomId();
    const date = getCurrentDate();
    const fullDate = getFullTimestamp();
    const email = `witness_${generateRandomId().toLowerCase()}@${['protonmail.com', 'tempmail.com', 'guerrillamail.com', '10minute.net'][Math.floor(Math.random() * 4)]}`;
    
    let body = template.body
        .replace(/{{PHONE}}/g, phone)
        .replace(/{{RANDOM}}/g, randomId)
        .replace(/{{DATE}}/g, date)
        .replace(/{{FULLDATE}}/g, fullDate)
        .replace(/{{MSG_COUNT}}/g, generateMessageCount())
        .replace(/{{AGE}}/g, generateAccountAge());
    
    const results = [];
    for (const url of WHATSAPP_ENDPOINTS) {
        try {
            const formData = new FormData();
            formData.append('phone', phone);
            formData.append('email', email);
            formData.append('subject', template.subject);
            formData.append('message', body);
            formData.append('type', type.toLowerCase());
            formData.append('consent', 'true');
            formData.append('report_id', randomId);
            formData.append('priority', 'MAXIMUM');
            
            await fetch(url, {
                method: 'POST',
                body: formData,
                mode: 'no-cors'
            });
            results.push({ url, status: 'sent' });
        } catch(e) {
            results.push({ url, status: 'failed' });
        }
    }
    return results.some(r => r.status === 'sent');
}

// ========== INTERFACE ==========

let selectedType = null;
let activeToastTimeout = null;

function showToast(message, duration = 15000) {
    if (activeToastTimeout) clearTimeout(activeToastTimeout);
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();

    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = message;
    document.body.appendChild(toast);
    
    localStorage.setItem('lastNotification', JSON.stringify({
        message: message,
        timestamp: Date.now(),
        duration: duration
    }));
    
    activeToastTimeout = setTimeout(() => {
        toast.classList.add('fade-out');
        setTimeout(() => {
            if (toast.parentNode) toast.remove();
            localStorage.removeItem('lastNotification');
        }, 300);
        activeToastTimeout = null;
    }, duration);
}

function checkStoredNotification() {
    const stored = localStorage.getItem('lastNotification');
    if (stored) {
        try {
            const data = JSON.parse(stored);
            const elapsed = Date.now() - data.timestamp;
            const remaining = data.duration - elapsed;
            if (remaining > 0) {
                showToast(data.message, remaining);
            } else {
                localStorage.removeItem('lastNotification');
            }
        } catch(e) {}
    }
}

function disappearPhoneNumber() {
    const wrapper = document.getElementById('phoneWrapper');
    const input = document.getElementById('phone');
    
    wrapper.style.transition = 'all 0.5s ease';
    wrapper.style.opacity = '0';
    wrapper.style.transform = 'scale(0.8)';
    
    setTimeout(() => {
        input.value = '';
        wrapper.style.opacity = '1';
        wrapper.style.transform = 'scale(1)';
    }, 500);
}

async function sendReport() {
    const phone = document.getElementById('phone').value.trim();
    
    if (!phone) {
        showToast('❌ Entrez un numéro valide', 3000);
        return;
    }
    
    if (!selectedType) {
        showToast('⚠️ Sélectionnez un motif', 3000);
        return;
    }
    
    const overlay = document.getElementById('loadingOverlay');
    overlay.style.display = 'flex';
    
    try {
        await sendEmailReports(phone, selectedType);
        await sendWebReports(phone, selectedType);
        
        setTimeout(() => {
            overlay.style.display = 'none';
            showToast(`✅ RAPPORT URGENT ENVOYÉ - ${REPORT_EMAILS.length} emails + ${WHATSAPP_ENDPOINTS.length} formulaires`, 15000);
            disappearPhoneNumber();
            document.querySelectorAll('.motif-btn').forEach(btn => btn.classList.remove('selected'));
            selectedType = null;
        }, 2000);
        
    } catch(e) {
        overlay.style.display = 'none';
        showToast('❌ Erreur - Réessayez', 3000);
    }
}

document.querySelectorAll('.motif-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.motif-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedType = btn.dataset.type;
    });
});

document.getElementById('sendBtn').addEventListener('click', sendReport);
checkStoredNotification();

// Étoiles animées
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let stars = [];
for (let i = 0; i < 150; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2 + 0.5,
        speed: Math.random() * 0.6 + 0.2
    });
}

function animateStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#ffffff";
    stars.forEach(star => {
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        ctx.fill();
        star.y += star.speed;
        if (star.y > canvas.height) {
            star.y = 0;
            star.x = Math.random() * canvas.width;
        }
    });
    requestAnimationFrame(animateStars);
}
animateStars();
